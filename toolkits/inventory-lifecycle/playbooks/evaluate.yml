---
# Apply the rules and write reports. Read-only against the DB. See SPEC §5.2.

- name: Inventory lifecycle — register mng_host
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/main.yml"
  tasks:
    - name: Define mng_host
      ansible.builtin.add_host:
        name: "{{ lifecycle_mng_host }}"
        groups: lifecycle_runtime
        ansible_connection: ssh
        ansible_host: "{{ lifecycle_mng_host_address | default(omit) }}"
        ansible_user: "{{ lifecycle_mng_host_user | default(omit) }}"
      changed_when: false

- name: Inventory lifecycle — evaluate on mng_host
  hosts: lifecycle_runtime
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/main.yml"
  vars:
    db_path: "{{ db_path | default(lifecycle_db_path) }}"
    report_dir: "{{ report_dir | default(lifecycle_report_dir) }}"
    inventory_filter: "{{ inventory | default('') }}"
    deploy_dir: "{{ lifecycle_deploy_dir }}"

  tasks:
    - name: Ensure deploy dir exists
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: Push lifecycle Python files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/"
        dest: "{{ deploy_dir }}/"
        mode: '0644'

    - name: Run evaluate
      ansible.builtin.command:
        argv: "{{
          [
            'python3', deploy_dir ~ '/evaluate_rules.py',
            '--db', db_path,
            '--report-dir', report_dir,
            '--silent-threshold-days', lifecycle_silent_threshold_days | string,
            '--min-successful-runs-before-action', lifecycle_min_successful_runs_before_action | string,
            '--min-run-success-pct', lifecycle_min_run_success_pct | string,
            '--intermittent-window-days', lifecycle_intermittent_window_days | string,
            '--intermittent-min-flips', lifecycle_intermittent_min_flips | string,
            '--max-remove-per-run-pct', lifecycle_max_remove_per_run_pct | string,
            '--max-remove-per-run-abs', lifecycle_max_remove_per_run_abs | string,
          ] + (['--inventory', inventory_filter] if inventory_filter else [])
        }}"
      register: eval_out
      changed_when: true

    - name: Show evaluate output
      ansible.builtin.debug:
        var: eval_out.stdout_lines
