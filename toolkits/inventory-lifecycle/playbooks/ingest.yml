---
# Absorb identify-hosts CSVs into the lifecycle DB on mng_host.
# See SPEC §5.1 and README "Running in AAP" / "Running locally".

- name: Inventory lifecycle — register mng_host
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/main.yml"
  tasks:
    - name: Define mng_host as a runtime host
      ansible.builtin.add_host:
        name: "{{ lifecycle_mng_host }}"
        groups: lifecycle_runtime
        ansible_connection: ssh
        ansible_host: "{{ lifecycle_mng_host_address | default(omit) }}"
        ansible_user: "{{ lifecycle_mng_host_user | default(omit) }}"
      changed_when: false

- name: Inventory lifecycle — ingest on mng_host
  hosts: lifecycle_runtime
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/main.yml"
  vars:
    csv_glob: "{{ csv_glob | default(lifecycle_csv_glob) }}"
    db_path: "{{ db_path | default(lifecycle_db_path) }}"
    allowlist_csv: "{{ allowlist_csv | default(lifecycle_allowlist_csv) }}"
    inventory_override: "{{ inventory | default('') }}"
    deploy_dir: "{{ lifecycle_deploy_dir }}"

  tasks:
    - name: Ensure deploy dir exists
      ansible.builtin.file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    - name: Push lifecycle Python files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/"
        dest: "{{ deploy_dir }}/"
        mode: '0644'

    - name: Ensure DB parent dir exists
      ansible.builtin.file:
        path: "{{ db_path | dirname }}"
        state: directory
        mode: '0755'

    - name: Run ingest
      ansible.builtin.command:
        argv: "{{
          [
            'python3', deploy_dir ~ '/lifecycle_db.py',
            '--db', db_path,
            'ingest',
            '--csv-glob', csv_glob,
            '--allowlist-csv', allowlist_csv,
            '--silent-threshold-days', lifecycle_silent_threshold_days | string,
            '--min-successful-runs-before-action', lifecycle_min_successful_runs_before_action | string,
            '--min-run-success-pct', lifecycle_min_run_success_pct | string,
          ] + (['--inventory', inventory_override] if inventory_override else [])
        }}"
      register: ingest_out
      changed_when: "'ingested' in ingest_out.stdout"
      failed_when: ingest_out.rc not in [0, 2]

    - name: Show ingest output
      ansible.builtin.debug:
        var: ingest_out.stdout_lines

    - name: Fail the play if any CSV failed to parse
      ansible.builtin.fail:
        msg: "one or more CSVs failed to parse — see output above"
      when: ingest_out.rc == 2
